name: SLO Smoke

on:
  workflow_dispatch:
    inputs:
      run_async:
        description: "Run async burst scenario too"
        required: false
        default: "true"
  schedule:
    - cron: "0 4 * * *"

jobs:
  smoke:
    name: v1 generation smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Start backend
        working-directory: backend
        env:
          DOCX_SERVICE_GENERATION_STORE: sqlite
          DOCX_SERVICE_V1_BEARER_TOKEN: dev-v1-token
          DOCX_SERVICE_V1_RATE_LIMIT_PER_MINUTE: "50000"
          DOCX_SERVICE_OTEL_ENABLED: "0"
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8080 >/tmp/docx-backend.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become healthy in time"
          cat /tmp/docx-backend.log || true
          exit 1

      - name: Bootstrap smoke document
        id: bootstrap
        run: |
          set -e
          JSON=$(curl -fsS -X POST http://127.0.0.1:8080/api/templates/bootstrap-empty \
            -H 'Content-Type: application/json' \
            -d '{"name":"SLO Smoke Template"}')
          TEMPLATE_ID=$(python -c "import json,sys; print(json.loads(sys.argv[1])['templateId'])" "$JSON")
          VERSION_ID=$(python -c "import json,sys; print(json.loads(sys.argv[1])['versionId'])" "$JSON")
          curl -fsS -X PUT "http://127.0.0.1:8080/api/templates/${TEMPLATE_ID}/versions/${VERSION_ID}/editor-text" \
            -H 'Content-Type: application/json' \
            -d '{"text":"Hello {{field_1}}"}' >/dev/null
          curl -fsS -X POST "http://127.0.0.1:8080/api/templates/${TEMPLATE_ID}/versions/${VERSION_ID}/publish" >/dev/null
          echo "template_id=${TEMPLATE_ID}" >> "$GITHUB_OUTPUT"
          echo "version_id=${VERSION_ID}" >> "$GITHUB_OUTPUT"

      - name: Run sync smoke scenario (k6)
        run: |
          docker run --rm --network host \
            -e BASE_URL=http://127.0.0.1:8080 \
            -e DOC_ID=${{ steps.bootstrap.outputs.template_id }} \
            -e VERSION_ID=${{ steps.bootstrap.outputs.version_id }} \
            -e BEARER_TOKEN=dev-v1-token \
            -v "$PWD":/work \
            grafana/k6:0.52.0 run /work/perf/k6/generation-smoke.js

      - name: Run async burst scenario (k6)
        if: ${{ github.event_name == 'schedule' || inputs.run_async == 'true' }}
        run: |
          docker run --rm --network host \
            -e BASE_URL=http://127.0.0.1:8080 \
            -e DOC_ID=${{ steps.bootstrap.outputs.template_id }} \
            -e VERSION_ID=${{ steps.bootstrap.outputs.version_id }} \
            -e BEARER_TOKEN=dev-v1-token \
            -v "$PWD":/work \
            grafana/k6:0.52.0 run /work/perf/k6/generation-async-burst.js

      - name: Print backend log on failure
        if: failure()
        run: cat /tmp/docx-backend.log || true
