name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS (attempt 1)
        id: deploy_attempt_1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/docx-service
            git fetch origin main
            git reset --hard origin/main
            cd deploy
            docker-compose -f docker-compose.prod.yml down --remove-orphans || true
            docker-compose -f docker-compose.prod.yml up -d --build

      - name: Deploy on VPS (attempt 2)
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/docx-service
            git fetch origin main
            git reset --hard origin/main
            cd deploy
            docker-compose -f docker-compose.prod.yml down --remove-orphans || true
            docker-compose -f docker-compose.prod.yml up -d --build

      - name: Fail if both deploy attempts failed
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        run: |
          echo "Both deploy attempts failed."
          exit 1
