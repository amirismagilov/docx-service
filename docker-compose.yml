services:
  api:
    image: python:3.12-slim
    working_dir: /app/backend
    command: sh -c "pip install -q -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8080"
    volumes:
      - ./:/app
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - minio

  web:
    image: node:20
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./:/app
    ports:
      - "5175:5175"
    depends_on:
      - api

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
